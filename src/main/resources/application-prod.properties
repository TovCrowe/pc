# PostgreSQL — URL is overridable via env (SPRING_DATASOURCE_URL) for containers/PaaS
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/policydb}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Port — PaaS platforms (Railway/Render) inject PORT; fall back to 8080 locally
server.port=${PORT:8080}

# Actuator — expose only the health endpoint for platform health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true