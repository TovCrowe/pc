# PostgreSQL connection.
# - docker-compose sets SPRING_DATASOURCE_URL directly (full JDBC URL).
# - Render (and similar) expose the DB as separate host/port/name parts, so the URL
#   is assembled from DB_HOST/DB_PORT/DB_NAME when SPRING_DATASOURCE_URL isn't set.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:policydb}}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Port — PaaS platforms (Railway/Render) inject PORT; fall back to 8080 locally
server.port=${PORT:8080}

# Actuator — expose only the health endpoint for platform health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true