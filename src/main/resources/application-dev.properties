# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:policydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — Flyway owns the schema now; Hibernate only validates entities against it.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway runs V1__init.sql against the fresh in-memory H2 DB on each start.
spring.flyway.enabled=true

# Consola H2 (ver tu BD en el browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Puerto
server.port=8080