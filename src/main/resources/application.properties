spring.application.name=policy-management-api
spring.profiles.active=dev

# Default admin user seeded on startup (override via env vars in production)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}

# CORS — browser origins allowed to call the API (comma-separated).
# Defaults to the Vite dev server; override in prod via APP_CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
